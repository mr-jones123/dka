<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" fill="none">
  <style>
    .wave {
      transform-box: fill-box;
      transform-origin: center;
      animation: pulse-wave 1.8s ease-out infinite;
    }
    .wave.mid { animation-delay: .18s; }
    .wave.outer { animation-delay: .36s; }
    @keyframes pulse-wave {
      0% { opacity: .35; transform: scale(.88); }
      45% { opacity: 1; }
      100% { opacity: .12; transform: scale(1.1); }
    }
    @media (prefers-reduced-motion: reduce) {
      .wave { animation: none; opacity: 1; }
    }
  </style>

